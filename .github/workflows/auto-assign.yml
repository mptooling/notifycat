name: auto-assign

# Only on open, so reopening or pushing to a PR never re-adds an assignee a
# human deliberately removed. pull_request_target gives a writable token even
# on Dependabot/fork PRs; this workflow never checks out or runs PR code.
on:
  pull_request_target:
    types:
      - opened

permissions:
  contents: read
  pull-requests: write

jobs:
  assign:
    name: Assign maintainer
    runs-on: ubuntu-latest

    steps:
      - name: Add assignee
        uses: kentaro-m/auto-assign-action@v2
        with:
          configuration-path: ".github/auto_assign.yml"
