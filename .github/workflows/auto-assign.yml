name: auto-assign

# Only on open, so reopening or pushing to a PR never re-adds an assignee a
# human deliberately removed. pull_request_target gives a writable token even
# on Dependabot/fork PRs; this workflow never checks out or runs PR code.
on:
  pull_request_target:
    types:
      - opened

permissions:
  contents: read
  pull-requests: write

jobs:
  assign:
    name: Assign maintainer
    runs-on: ubuntu-latest

    steps:
      - name: Add assignee
        # This action publishes only full semver tags — there is no moving @v2
        # major tag — so it must be pinned to an exact release.
        uses: kentaro-m/auto-assign-action@v2.0.2
        with:
          configuration-path: ".github/auto_assign.yml"
