name: docker-release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Build and publish image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  assets:
    name: Attach install bundle to release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Assemble install bundle
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -eu
          version="${TAG#v}"
          mkdir -p dist
          cp compose.yaml Caddyfile notifycat .env.example mappings.example.yaml \
             scripts/install.sh dist/
          # Pin the bundled installer to this release so it fetches matching assets.
          sed -i \
            "s|^VERSION=\"\${NOTIFYCAT_VERSION:-[^}]*}\"|VERSION=\"\${NOTIFYCAT_VERSION:-${version}}\"|" \
            dist/install.sh
          cd dist
          sha256sum compose.yaml Caddyfile notifycat .env.example mappings.example.yaml \
            install.sh > SHA256SUMS

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          cd dist
          gh release upload "$TAG" \
            compose.yaml Caddyfile notifycat .env.example mappings.example.yaml \
            install.sh SHA256SUMS \
            --clobber --repo "$GITHUB_REPOSITORY"
