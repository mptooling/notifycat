# Notifycat configuration file — example
#
# Copy this to config.yaml (next to .env, or wherever NOTIFYCAT_CONFIG_FILE points) and edit the
# entries below. Then run:
#
#   notifycat-config list                    # show what's parsed
#   notifycat-config validate                # check every entry against Slack + GitHub
#   notifycat-config validate <owner/repo>   # check just one repo
#   notifycat-config validate --force        # ignore the lock cache and revalidate everything
#
# Secrets (GITHUB_WEBHOOK_SECRET, SLACK_BOT_TOKEN, GITHUB_TOKEN) and infra-interpolation values
# (DOMAIN, ACME_EMAIL) are NOT in this file — they live in .env. See .env.example.
#
# The config file path defaults to ./config.yaml. Override with NOTIFYCAT_CONFIG_FILE.
# Docker image default: /app/config.yaml.

# ── Server ────────────────────────────────────────────────────────────────────────────────────────
server:
  addr: ":8080"                       # HTTP listen address
  log_level: info                     # debug | info | warn | error
  log_format: text                    # text | json (use json for production)
  domain: notifycat.example.com       # public domain; notifycat-doctor derives https://$domain/webhook/github

# ── Database ──────────────────────────────────────────────────────────────────────────────────────
database:
  url: "file:./data/notifycat.db"     # SQLite path or file: DSN; stores per-PR Slack message timestamps
  # Local (go run): the relative path above resolves under the repo — fine as-is.
  # Docker/compose: the named volume is mounted at /app, so this relative path persists as
  #   /app/data/notifycat.db. The historical absolute path "file:/app/notifycat.db" also works.
  # WARNING: under the shipped compose ONLY /app is on the writable volume. A path outside /app
  #   (e.g. "file:/data/notifycat.db") lives in the container layer and is LOST every time the
  #   container is recreated — including each image upgrade. Always keep the DB under /app.

# ── Slack ─────────────────────────────────────────────────────────────────────────────────────────
slack:
  base_url: "https://slack.com"       # override for tests only
  reactions:
    enabled: true                     # set false to disable all reaction updates
    new_pr: eyes                      # added when a PR is opened; also the leading emoji in the new-PR message
    merged_pr: twisted_rightwards_arrows  # added when a PR is merged
    closed_pr: x                      # added when a PR is closed without merge
    approved: white_check_mark        # added when a review approves
    commented: speech_balloon         # added when a review comments
    request_change: exclamation       # added when a review requests changes
    bot_review: robot_face            # added alongside the normal reaction when a bot reviewer is NOT suppressed

# Use Slack emoji names without surrounding colons. For example: approved: shipit, not :shipit:.

# ── GitHub ────────────────────────────────────────────────────────────────────────────────────────
github:
  base_url: "https://api.github.com"  # override for GitHub Enterprise or tests

# ── Cleanup ───────────────────────────────────────────────────────────────────────────────────────
cleanup:
  message_ttl_days: 30                # days a slack_messages row may go without update before deletion; must be > 0

# ── Reviews ───────────────────────────────────────────────────────────────────────────────────────
reviews:
  ignore_ai_reviews: false            # when true, skip reactions.add for any review whose sender.type == "Bot"
  dependabot_format: true             # when true, dependabot[bot] / renovate[bot] PRs use a compact message format

# ── Stuck-PR digest ───────────────────────────────────────────────────────────────────────────────
# A scheduled reminder listing open PRs nobody has touched since before today. ON BY DEFAULT — omit
# this whole section and the server posts a digest at 9am daily (server-local time).
#
# On each tick the server posts one parent message per Slack channel and threads the stuck-PR list
# under it, pinging the channel's mentions. Channels with no stuck PRs get no message.
digest:
  enabled: true                       # default true; set false to turn the digest off globally
  schedule: "0 9 * * *"              # standard 5-field cron; server-local time; default 9am daily

# ── Mappings ──────────────────────────────────────────────────────────────────────────────────────
# Repository → Slack-channel routing. Per-repo tier schema (0.18+): each org contains zero or more
# per-repo tiers plus an optional "*" tier. Each tier (repo or "*") sets channel and optional mentions.
# Resolution: for org/repo, merge the org/repo tier over the org/* tier; most-specific tier that sets
# a key wins. Channel inherits (repo's own, else "*"'s); mentions inherit with <!channel> as fallback.
mappings:

  # ── Mixed explicit repos + catch-all ────────────────────────────────────────────────────────────
  # An org with two explicit repos (acme/api has its own channel, acme/web inherits from "*") plus
  # a "*" tier that supplies defaults and catches any other acme/* repo. acme/api pings @alice and @bob;
  # acme/web and acme/anything-else ping @channel (the fallback when mentions is absent).
  acme:
    api:
      channel: C0123ABCDE                     # Slack channel ID (NOT the display name)
      mentions:
        - "<@U0123ALICE>"                     # individual user
        - "<@U0456BOB>"                       # individual user
    web:
      # No channel here — inherits from "*" below.
      mentions: []                             # explicit: ping nobody on acme/web
    "*":
      channel: C0DEFAULT00                    # org-level tier: supplies channel default and catches unlisted repos
      # No mentions: key — acme/web and any other acme/* inherit @channel (<!channel>)

  # ── Whole-org via "*" only ──────────────────────────────────────────────────────────────────────
  # An org with no explicit repo tiers, only a "*" tier. Every beta/* repo routes to #beta-prs and
  # pings @channel (Slack wire: <!channel>). Useful for whole-org rollups where every PR should reach
  # the room but you don't want to list every repo individually.
  beta:
    "*":
      channel: C0456FGHIJ

  # ── Silent tier with empty mentions ──────────────────────────────────────────────────────────────
  # An org with a single explicit tier that posts without pinging anyone. Use mentions: [] when you
  # want a silent post; omit the key entirely for an @channel ping instead. This gamma/platform tier
  # posts to #gamma-quiet but never @'s anyone.
  gamma:
    platform:
      channel: C0234PQRST
      mentions: []                             # explicit: ping nobody on gamma/platform

  # ── Per-repo behavioral overrides (0.18+) ──────────────────────────────────────────────────────
  # Each repo tier can override behavioral settings: reactions, reviews, and digest schedule. Overrides inherit from org/* then fall back to the global section; most-specific tier wins. For example, delta/premium may use a different approval emoji or post its digest on a custom schedule while delta/standard uses the global defaults.
  delta:
    premium:
      channel: C0PREMIUM00
      # Optional: override reactions for this repo. Missing keys inherit from the org/* tier, then the global "slack.reactions:" section.
      reactions:
        approved: star                        # use :star: instead of the global white_check_mark
        # other reaction keys omitted → inherit from org/* or global
      # Optional: override review behavior (ignore_ai_reviews and dependabot_format) for this repo.
      reviews:
        ignore_ai_reviews: true               # suppress bot reviews on this repo specifically
      # Optional: override digest schedule for this repo. digest.enabled and digest.schedule inherit from global "digest:" when omitted.
      digest:
        schedule: "0 17 * * *"                # post this repo's digest at 5pm instead of the global 9am
    standard:
      channel: C0STANDARD00
      # Omit all behavioral overrides to use global defaults.

# ── Mappings rules ─────────────────────────────────────────────────────────────────────────────────
# • The org key (acme, beta, gamma, …) matches ^[A-Za-z0-9_.-]+$. Org tier keys are repo names or "*".
# • channel must look like a Slack ID: ^[CGD][A-Z0-9]{2,}$ (C…, G…, D…). Every resolvable org/repo pair must yield a channel.
# • mentions has three states: key absent → inherit (with <!channel> as final fallback); mentions: [] → ping nobody; [<...>] → ping those handles. mentions: null is rejected.
# • For org/repo, the org/repo tier merges over the org/* tier; most-specific tier that sets a key wins. Channel inherits (repo's own, else "*"'s). Mentions: absent → inherit, [] → nobody, or explicit handles.
# • "*" is both the org-level default tier (explicit repos inherit from it) AND the catch-all (unlisted repos route to it). Every org must have at least one tier with a channel set.
# • Duplicate repo names in the same org are rejected at parse time.
# • Unknown YAML keys anywhere are rejected — typos surface immediately.
