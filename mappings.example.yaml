# Notifycat mappings file — example
#
# Copy this to mappings.yaml (next to .env or wherever NOTIFYCAT_MAPPINGS_FILE
# points) and edit the entries below. Then run:
#
#   notifycat-mapping list                    # show what's parsed
#   notifycat-mapping validate                # check every entry against Slack + GitHub
#   notifycat-mapping validate <owner/repo>   # check just one repo
#   notifycat-mapping validate --force        # ignore the lock cache and revalidate everything
#
# The server reads the same file at boot and refuses to start if validation
# fails for any entry. Successful runs are recorded in mappings.lock so the
# server can skip the network round-trip on the next boot.

mappings:

  # ── Explicit list ─────────────────────────────────────────────────────────
  # An org with a hand-picked list of repos. Every webhook from acme/api or
  # acme/web routes to #engineering-prs and pings @alice, @bob, and the
  # platform user group.
  acme:
    channel: C0123ABCDE                       # Slack channel ID (NOT the display name)
    mentions:
      - "<@U0123ALICE>"                       # individual user
      - "<@U0456BOB>"                         # individual user
      - "<!subteam^S0789PLAT>"                # user group / subteam
    repositories:
      - api
      - web

  # ── Wildcard + @channel fallback ─────────────────────────────────────────
  # `repositories: "*"` matches every repo in the org. Omitting the
  # `mentions:` key entirely means "ping @channel" (Slack wire: <!channel>).
  # Useful for whole-org rollups where every PR should reach the room.
  beta:
    channel: C0456FGHIJ
    repositories: "*"

  # ── Explicit @channel ────────────────────────────────────────────────────
  # Equivalent to omitting `mentions:` for this entry. Listed here for
  # operators who prefer the explicit wire token over the absent-key
  # shortcut — both render the same message.
  gamma:
    channel: C0234PQRST
    mentions:
      - "<!channel>"                          # Slack wire format for @channel
      # Also valid: "<!here>" for @here, "<!subteam^S…>" for a user group.
    repositories:
      - platform

  # ── Empty mentions ───────────────────────────────────────────────────────
  # `mentions: []` posts without pinging anyone (no stranded comma in the
  # message). Use this when you want a silent post; omit the key entirely
  # for an @channel ping instead.
  legacy:
    channel: C0789KLMNO
    mentions: []
    repositories:
      - monolith

# Rules
# ─────
# • The org key (acme, beta, gamma, legacy, …) matches `^[A-Za-z0-9_.-]+$`.
# • `channel` must look like a Slack ID: `^[CGD][A-Z0-9]{2,}$` (C…, G…, D…).
# • `mentions` is optional — three states:
#     - key absent     → fall back to @channel (<!channel>)
#     - `mentions: []` → ping nobody (no stranded artifacts in the message)
#     - `[<...>]`      → ping those handles
#   `mentions: null` (or `~`) is rejected — pick one of the three above.
# • `repositories` is either the literal string "*" or a list of bare repo
#   names. Names cannot contain "/". A list cannot mix "*" with names.
# • Duplicate repos in the same org are rejected at parse time.
# • Unknown YAML keys anywhere are rejected — typos surface immediately.
