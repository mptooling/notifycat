version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - noctx
    - nolintlint
    - unconvert
    - unparam
  settings:
    revive:
      rules:
        - name: var-naming
        - name: exported
        - name: unexported-return
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: errorf
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/mptooling/notifycat
