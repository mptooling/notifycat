version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - noctx
    - nolintlint
    - unconvert
    - unparam
    - depguard
  settings:
    depguard:
      rules:
        # Kernel purity: internal/kernel is the pure center of the hexagon and
        # must import nothing from any other internal/... package.
        kernel-purity:
          files:
            - "**/internal/kernel/**"
          deny:
            - pkg: github.com/mptooling/notifycat/internal
              desc: internal/kernel must stay pure — it imports only the standard library, never another internal/... package
        # Per-domain layer boundaries are added here as domains migrate
        # (Phases 1–8). Template — a domain's `domain` layer may reach only the
        # shared kernel and its dependency domains' `domain` layers, never any
        # `application` or `infrastructure`:
        #
        # <domain>-domain-purity:
        #   files:
        #     - "**/internal/<domain>/domain/**"
        #   deny:
        #     - pkg: github.com/mptooling/notifycat/internal
        #       desc: domain layer imports only the shared kernel and dependency domains' domain layers
        #   # then re-`allow` the kernel + permitted domain-layer packages.
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
        - (io.Writer).Write
    gosec:
      excludes:
        # G705 (XSS via taint) is HTML-rendering oriented; this is not a web
        # template engine. We rely on G107 and HMAC for inbound trust.
        - G705
    revive:
      rules:
        - name: var-naming
        - name: exported
        - name: unexported-return
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: errorf
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/mptooling/notifycat
