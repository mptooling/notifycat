run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - gosec
    - gosimple
    - govet
    - ineffassign
    - revive
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - misspell
    - bodyclose
    - noctx
    - nolintlint
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/mptooling/notifycat
  revive:
    rules:
      - name: var-naming
      - name: exported
      - name: unexported-return
      - name: error-return
      - name: error-naming
      - name: if-return
      - name: indent-error-flow
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: errorf

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - unparam
