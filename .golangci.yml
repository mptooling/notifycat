version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - noctx
    - nolintlint
    - unconvert
    - unparam
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
        - (io.Writer).Write
    gosec:
      excludes:
        # G705 (XSS via taint) is HTML-rendering oriented; this is not a web
        # template engine. We rely on G107 and HMAC for inbound trust.
        - G705
    revive:
      rules:
        - name: var-naming
        - name: exported
        - name: unexported-return
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: errorf
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/mptooling/notifycat
