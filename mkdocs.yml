site_name: Notifycat
site_description: Low-noise pull request notifications for Slack — one updating message per PR.
site_url: https://mptooling.github.io/notifycat/
repo_url: https://github.com/mptooling/notifycat
repo_name: mptooling/notifycat
edit_uri: edit/main/docs/

exclude_docs: |
  superpowers/
  requirements.txt

validation:
  links:
    anchors: warn

theme:
  name: material
  custom_dir: overrides
  icon:
    logo: notifycat
  favicon: assets/logo.png
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.snippets
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - What is Notifycat:
      - Overview: index.md
      - What you see in Slack: features.md
  - Install:
      - Docker Compose (recommended): compose.md
      - Manual Docker: docker.md
      - Run from source: getting-started.md
      - Slack app: slack-app.md
      - GitHub webhook: github-webhook.md
      - Bitbucket webhook: bitbucket-webhook.md
      - Security & permissions: security.md
  - Use:
      - Configuration basics: configure.md
      - Route repositories to channels: routing.md
      - Monorepos: monorepo.md
      - Reactions & bot reviews: bots-and-reactions.md
      - Stuck-PR digest: digest.md
  - Troubleshoot:
      - Start here: troubleshooting.md
      - Doctor: doctor.md
  - Reference:
      - config.yaml: configuration.md
      - Mappings schema: mappings.md
      - CLI binaries: cli.md
      - Operations: operations.md
  - Upgrading:
      - Upgrade notes: upgrading.md
      - 0.17 — config.yaml migration: 0.17-config-migration.md
      - 0.18 — mappings tiers migration: 0.18-per-repo-mappings-migration.md
